      text-decoration: none;
      font-size: 0.93rem;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      color: #fff;
    }
    .link-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(0,0,0,0.35); }
    .link-btn .icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: #fff;
    }
    .link-btn .icon img { width: 100%; height: 100%; object-fit: cover; }
    .link-btn .label { flex: 1; text-align: left; }
    .link-btn .label small { display: block; font-weight: 400; font-size: 0.74rem; opacity: 0.7; margin-top: 2px; }
    .btn-zalo  { background: rgba(0,104,255,0.25); border: 1px solid rgba(0,104,255,0.4); }
    .btn-fb    { background: rgba(24,119,242,0.25); border: 1px solid rgba(24,119,242,0.4); }
    .btn-yt    { background: rgba(255,0,0,0.22);    border: 1px solid rgba(255,0,0,0.35); }
    .btn-phone { background: rgba(52,211,153,0.22); border: 1px solid rgba(52,211,153,0.35); }
    .arrow { opacity: 0.45; font-size: 18px; }
    .divider { height: 1px; background: rgba(255,255,255,0.12); margin: 4px 0; }
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
      z-index: 999; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 22px;
      padding: 28px 22px 20px; max-width: 320px; width: 90%;
      text-align: center; animation: popIn 0.22s ease;
    }
    @keyframes popIn { from { transform: scale(0.82); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .modal h2 { color: #0068ff; margin-bottom: 4px; font-size: 1.1rem; }
    .modal p  { color: #666; font-size: 0.8rem; margin-bottom: 14px; }
    .modal img { width: 100%; max-width: 260px; border-radius: 12px; border: 3px solid #e5e7eb; }
    .modal-close {
      margin-top: 14px; background: #0068ff; color: white;
      border: none; padding: 10px 28px; border-radius: 10px;
      cursor: pointer; font-size: 0.88rem; font-weight: 600;
    }
    .modal-close:hover { background: #0054cc; }

    .back-btn {
      display: block;
      margin: 20px auto 0;
      padding: 10px 28px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 12px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.2s;
      width: fit-content;
    }
    .back-btn:hover { background: rgba(255,255,255,0.25); color: #fff; }
  </style>
